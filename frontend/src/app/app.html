<div class="app-shell">
  <app-ambient-background></app-ambient-background>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" routerLink="/" aria-label="FunKids">
        <img class="brand-image" src="/funkids-logo-real.svg" alt="Fun Kids Diversion y Sonrisas" />
      </a>

      <nav class="nav-links" aria-label="Principal">
        <a class="nav-link" routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
        <a
          class="nav-link rewards-link"
          href="https://clientes.ultimateerp.cl/registro?tenantId=funkids"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Obtén tu tarjeta de fidelización, acumula estrellas y canjéalas por premios"
        >
          <span class="rewards-link__icon" aria-hidden="true">⭐</span>
          <span class="rewards-link__copy">
            <strong>Tarjeta de fidelización</strong>
            <small>Acumula estrellas y canjéalas por premios</small>
          </span>
          <span class="rewards-link__arrow" aria-hidden="true">→</span>
        </a>
        <a class="nav-link" routerLink="/bases-legales" routerLinkActive="is-active">Bases legales</a>
        <a class="nav-link" routerLink="/admin" routerLinkActive="is-active">Login</a>
      </nav>
    </div>
  </header>

  <router-outlet></router-outlet>
</div>
